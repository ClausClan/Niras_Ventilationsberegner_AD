<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIRAS VentilationsberegnerADV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">

<!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="72x72" href="/favicon.png"> <!-- Juster sizes hvis dit favicon.png har en anden størrelse -->
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">
    
    <!-- Android / Chrome -->
    <meta name="theme-color" content="#ffffff"> <!-- Ret evt. til din primære app-farve -->

    <!-- Three.js and OrbitControls -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>

    <div class="container">
        <div class="calculator-container">
            <header class="header">
                <div class="logo">
                    <div class="logo-main">
                        <!-- NIRAS Logo SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 10.079999923706055 116.43000030517578 41.190006256103516" data-asc="1.0087890625"
                            width="116.43000030517578" height="41.190006256103516">
                            <defs />
                            <g fill="#000000">
                                <g transform="translate(0, 0)">
                                    <path
                                        d="M22.95 10.91L22.95 50.44L13.94 50.44L8.59 32.47L8.59 50.44L0 50.44L0 10.91L8.59 10.91L14.36 28.71L14.36 10.91L22.95 10.91ZM37.35 10.91L37.35 50.44L27.08 50.44L27.08 10.91L37.35 10.91ZM41.48 10.91L48.75 10.91Q56.03 10.91 58.61 11.47Q61.18 12.04 62.81 14.34Q64.43 16.65 64.43 21.70Q64.43 26.32 63.28 27.91Q62.13 29.49 58.76 29.81Q61.82 30.57 62.87 31.84Q63.92 33.11 64.17 34.17Q64.43 35.23 64.43 40.01L64.43 50.44L54.88 50.44L54.88 37.30Q54.88 34.13 54.38 33.37Q53.88 32.62 51.76 32.62L51.76 50.44L41.48 50.44L41.48 10.91M51.76 17.68L51.76 26.46Q53.49 26.46 54.19 25.99Q54.88 25.51 54.88 22.90L54.88 20.73Q54.88 18.85 54.21 18.26Q53.54 17.68 51.76 17.68ZM86.16 10.91L92.04 50.44L81.52 50.44L81.01 43.33L77.32 43.33L76.71 50.44L66.06 50.44L71.29 10.91L86.16 10.91M80.71 36.33Q79.93 29.61 79.15 19.75Q77.59 31.08 77.20 36.33L80.71 36.33ZM115.58 22.88L106.03 22.88L106.03 19.95Q106.03 17.90 105.66 17.33Q105.30 16.77 104.44 16.77Q103.52 16.77 103.04 17.53Q102.56 18.29 102.56 19.82Q102.56 21.80 103.10 22.80Q103.61 23.80 106.01 25.22Q112.87 29.30 114.65 31.91Q116.43 34.52 116.43 40.33Q116.43 44.56 115.44 46.56Q114.45 48.56 111.62 49.91Q108.79 51.27 105.03 51.27Q100.90 51.27 97.99 49.71Q95.07 48.14 94.17 45.73Q93.26 43.31 93.26 38.87L93.26 36.28L102.81 36.28L102.81 41.09Q102.81 43.31 103.21 43.95Q103.61 44.58 104.64 44.58Q105.66 44.58 106.16 43.77Q106.67 42.97 106.67 41.38Q106.67 37.89 105.71 36.82Q104.74 35.74 100.90 33.23Q97.07 30.69 95.83 29.54Q94.58 28.39 93.76 26.37Q92.94 24.34 92.94 21.19Q92.94 16.65 94.10 14.55Q95.26 12.45 97.85 11.27Q100.44 10.08 104.10 10.08Q108.11 10.08 110.93 11.38Q113.75 12.67 114.66 14.64Q115.58 16.60 115.58 21.31L115.58 22.88Z" />
                                </g>
                            </g>
                        </svg>
                    </div>
                    <div class="logo-subtitle">VentCalculatorADV</div>
                </div>

                <div class="header-controls">
                    <div class="toolbar-group">
                        <button id="undoButton" class="icon-button" title="Fortryd (Ctrl+Z)" disabled>
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path
                                    d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" />
                            </svg>
                        </button>
                        <button id="redoButton" class="icon-button" title="Annuller fortryd (Ctrl+Y)" disabled>
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path
                                    d="M18.4 10.6C16.55 9 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" />
                            </svg>
                        </button>
                    </div>
                    <!--
                    <button id="projectsButton" class="icon-button" title="Mine Projekter">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                        </svg>
                    </button>
                    -->
                    <button id="helpButton" class="help-button" title="Hjælp & Info">?</button>
                    <div id="saveStatus" class="save-status"></div>
                    <div class="theme-switch-wrapper">
                        <span class="theme-switch-label">Future Vibe</span>
                        <label class="theme-switch" for="themeToggle">
                            <input type="checkbox" id="themeToggle" checked />
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </header>

            <div class="global-settings" style="display: flex; gap: 15px;">
                <div class="input-group" style="margin-bottom: 0;">
                    <div class="input-unit-wrapper" data-unit="°C">
                        <label for="temperature">Lufttemperatur (Start)</label>
                        <input type="text" id="temperature" class="input-field" value="20">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <div class="input-unit-wrapper" data-unit="°C">
                        <label for="ambient_temperature">Omgivelsestemperatur</label>
                        <input type="text" id="ambient_temperature" class="input-field" value="20">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <div class="input-unit-wrapper" data-unit="%">
                        <label for="humidity">Relativ Luftfugtighed (RH)</label>
                        <input type="text" id="humidity" class="input-field" value="50">
                    </div>
                </div>
            </div>

            <nav class="tab-nav">
                <button class="tab-link active" data-tab="dimensioning">Kanal</button>
                <button class="tab-link" data-tab="fittings">Formstykker</button>
                <button class="tab-link" data-tab="system">System</button>
            </nav>

            <div id="dimensioning" class="tab-content">
                <!-- Content injected by main.js -->
            </div>

            <div id="fittings" class="tab-content hidden">
                <!-- Content injected by main.js -->
            </div>

            <div id="system" class="tab-content hidden">
                <div class="header-controls" style="margin-bottom: 20px; justify-content: space-between;">
                    <h2 style="border: none; margin: 0; padding-bottom: 10px;">Systemberegning</h2>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button type="button" id="toggleViewBtn" class="button secondary"
                            style="width: auto; padding: 5px 15px;" onclick="window.toggleDiagramView()">Vis
                            Diagram</button>
                        <!-- Diagram Controls (Hidden by default, shown when Diagram is active) -->
                        <div id="diagramControls" class="hidden" style="display: flex; gap: 10px;">
                            <select id="diagramColorMode" class="input-field" style="width: auto; padding: 5px;"
                                onchange="window.updateDiagramSettings()">
                                <option value="default">Farve: Standard</option>
                                <option value="velocity">Farve: Hastighed</option>
                                <option value="pressure">Farve: Tryktab</option>
                            </select>
                            <select id="diagramLabelMode" class="input-field" style="width: auto; padding: 5px;"
                                onchange="window.updateDiagramSettings()">
                                <option value="name">Tekst: Navn</option>
                                <option value="detailed">Tekst: Detaljer (m/s, Pa)</option>
                                <option value="compact">Tekst: Kompakt</option>
                            </select>
                            <button type="button" class="button secondary" style="width: auto; padding: 5px 15px;"
                                onclick="window.zoomAllDiagram()">
                                <i class="fas fa-compress-arrows-alt"></i> Zoom All
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Content injected by main.js -->
            </div>
        </div>
        <footer class="app-footer">
        <p>AppVersion 0.14.1beta --- Spørgsmål kontakt CWA@niras.dk</p>
        </footer>
    </div>

    <!-- Modal for details -->
    <div id="detailsModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal"
                onclick="document.getElementById('detailsModal').style.display='none'">&times;</span>
            <h3 id="modalTitle">Detaljer</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Modal for help -->
    <div id="helpModal" class="modal hidden">
        <!-- Content injected by ui.js -->
    </div>

    <!-- Modal for custom confirmation -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <h3 style="margin-top: 0;">Bekræft handling</h3>
            <p id="confirmMessage" style="margin: 20px 0; font-size: 16px;"></p>
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 25px;">
                <button id="btnConfirmCancel" class="button secondary">Annuller</button>
                <button id="btnConfirmOk" class="button primary">OK</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js?v=3"></script>

</body>

</html>
